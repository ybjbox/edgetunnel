name: Upstream Sync

permissions:
  contents: write
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  schedule:
    - cron: "0 0 * * *" # 每天运行一次
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check and Global Sync
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 1. 添加上游仓库并拉取
          git remote add upstream https://github.com/cmliu/edgetunnel.git
          git fetch upstream main
          
          # 2. 比对 _worker.js 是否有变动
          if git diff --quiet HEAD upstream/main -- "_worker.js"; then
            echo "上游 _worker.js 没有发生变动，跳过全局同步。"
            exit 0
          else
            echo "检测到上游 _worker.js 已更新，开始执行全局同步！"
            
            # 3. 备份自定义脚本
            WORKFLOW_FILE=".github/workflows/sync.yml"
            cp $WORKFLOW_FILE /tmp/my_custom_sync.yml
            
            # 4. 全局强制重置
            git checkout main
            git reset --hard upstream/main
            
            # 5. 恢复自定义脚本
            mkdir -p .github/workflows
            cp /tmp/my_custom_sync.yml $WORKFLOW_FILE
            
            # 6. 重新提交
            git add $WORKFLOW_FILE
            git commit -m "Auto Sync: 全局同步上游代码并保留自定义工作流"
            
            # 💡【核心修正】使用你的自定义 PAT 推送，解决修改 workflow 的权限问题
            # 请确保你已经在仓库 Settings -> Secrets 中设置了名为 PAT 的变量
            git push https://${{ secrets.PAT }}@github.com/${{ github.repository }}.git main --force
            
            echo "全局同步完成，且自定义脚本已安全恢复！"
          fi

      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 自动更新失败，请检查运行日志。"
          exit 1
